<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waffyログイン</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/styleForLogin.css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <div class="header-wrapper">
        <header th:fragment="page_header">
            <nav class="navbar navbar-expand-lg bg-body-tertiary">
                <div class="container-fluid nav navbar-white bg-white">
                    <a class="navbar-brand mb-0 h1" href="">Waffy</a>
                </div>
            </nav>
        </header>
    </div>

    <div class="container">
        <div class="outline">
            <form action="" th:object="${loginUser}" method="post" class="box">
                <div th:if="${#fields.hasErrors('loginId')}">
                    <span th:errors="*{loginId}" class="error alert alert-danger my-2 same-width"></span>
                </div>
                <div>
                    <input type="text" class="same-width" th:field="*{loginId}" placeholder="ログインID" name="loginId" id="loginId">
                </div>
                <div class="box_space">
	                <div th:if="${#fields.hasErrors('password')}">
	                    <span th:errors="*{password}" class="same-width error alert alert-danger my-2"></span>
	                </div>
	                <div>
	                    <input class="same-width" type="password" th:field="*{password}" placeholder="パスワード" name="password" id="password">
	                </div>                
                </div>
                <div class="box_space">
                    <input type="submit" class="btn btn-primary same-width" value="ログイン">
                </div>
            </form>
        </div>
    </div>
</body>

</html>

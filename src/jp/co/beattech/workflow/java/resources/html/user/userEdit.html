<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ユーザ編集</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="../../css/style.css">
</head>

<body>

<div class="container mt-4">
	<h2 class="mb-4">ユーザ編集</h2>

<form id="userForm">

	<!-- 氏名 -->
	<div class="mb-3">
		<label>氏名（必須）</label>
		<input type="text" id="name" class="form-control" value="山田 太郎">
		<div class="invalid-feedback"></div>
	</div>

	<!-- ログインID -->
	<div class="mb-3">
		<label>ログインID（必須）</label>
		<input type="text" id="loginId" class="form-control" value="yamada01">
		<div class="invalid-feedback"></div>
	</div>

	<!-- パスワード -->
	<div class="mb-3">
		<label>パスワード（変更の場合のみ）</label>
		<input type="password" id="password" class="form-control">
	</div>

	<!-- ユーザ種別 -->
	<div class="mb-3">
		<label>ユーザ種別（必須）</label>
		<select id="userType" class="form-select">
			<option value="">選択してください</option>
			<option value="admin">管理者</option>
			<option value="user" selected>一般</option>
		</select>
		<div class="invalid-feedback">ユーザ種別を入力してください。</div>
	</div>

	<!-- 所属グループ -->
	<div class="mb-3">
		<label>所属グループ（必須）</label>
		<select id="group" class="form-select">
			<option value="">選択してください</option>
			<option value="hr">人事部</option>
			<option value="dev">開発部</option>
			<option value="sales" selected>営業部</option>
		</select>
		<div class="invalid-feedback">所属グループを入力してください。</div>
	</div>

	<!-- 支店 -->
	<div class="mb-3">
		<label>支店（必須）</label>
		<select id="branch" class="form-select">
			<option value="">選択してください</option>
			<option value="tokyo" selected>東京支店</option>
			<option value="osaka">大阪支店</option>
			<option value="nagoya">名古屋支店</option>
		</select>
		<div class="invalid-feedback">支店を入力してください。</div>
	</div>

	<!-- ボタン -->
	<div class="d-flex gap-2 mt-4">
		<button type="button" class="btn btn-secondary">キャンセル</button>
		<button type="submit" class="btn btn-secondary">保存</button>
	</div>

</form>
</div>

<script>
const form = document.getElementById("userForm");

// キャンセル
document.querySelector(".btn-secondary").addEventListener("click", function() {
	window.location.href = "user.html";
});

const name = document.getElementById("name");
const loginId = document.getElementById("loginId");
const userType = document.getElementById("userType");
const group = document.getElementById("group");
const branch = document.getElementById("branch");

// 今編集しているユーザ（自分）
const currentLoginId = "yamada01";

// ダミー（他ユーザ）
const existingLoginIds = ["admin", "test", "user01", "yamada01"];

// エラー処理
function setError(el, msg) {
	el.classList.add("is-invalid");
	el.nextElementSibling.textContent = msg;
}

function setOk(el) {
	el.classList.remove("is-invalid");
}

// submit
form.addEventListener("submit", function(e) {

	let ok = true;

	// 氏名
	if (name.value === "") {
		setError(name, "氏名を入力してください。");
		ok = false;
	} else if (name.value.length > 50) {
		setError(name, "氏名は50文字以内で入力してください。");
		ok = false;
	} else {
		setOk(name);
	}

	// ログインID
	if (loginId.value === "") {
		setError(loginId, "ログインIDを入力してください。");
		ok = false;
	} else if (loginId.value.length > 50) {
		setError(loginId, "ログインIDは50文字以内で入力してください。");
		ok = false;
	} else if (
		existingLoginIds.includes(loginId.value) &&
		loginId.value !== currentLoginId // ← 自分は除外
	) {
		setError(loginId, "このログインIDは既に使われています。");
		ok = false;
	} else {
		setOk(loginId);
	}

	// ユーザ種別
	if (userType.value === "") {
		setError(userType, "ユーザ種別を入力してください。");
		ok = false;
	} else {
		setOk(userType);
	}

	// 所属グループ
	if (group.value === "") {
		setError(group, "所属グループを入力してください。");
		ok = false;
	} else {
		setOk(group);
	}

	// 支店
	if (branch.value === "") {
		setError(branch, "支店を入力してください。");
		ok = false;
	} else {
		setOk(branch);
	}

	// NGなら止める
	if (!ok) {
		e.preventDefault();
		return;
	}

	// OKなら遷移
	e.preventDefault();
	window.location.href = "userEditDone.html";
});

</script>

</body>
</html>

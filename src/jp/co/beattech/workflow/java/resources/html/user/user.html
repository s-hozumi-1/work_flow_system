<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ユーザ一覧</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="../../css/style.css">
</head>

<body>

<div class="container mt-4">

<!-- ヘッダー -->
<div class="d-flex justify-content-between align-items-center mb-3">
	<h2>ユーザ一覧</h2>
	<a href="../login/logout.html" class="logout-link">ログアウト</a>
</div>

<!-- ページネーション -->
<nav>
	<ul class="pagination" id="pagination"></ul>
</nav>

<!-- テーブル -->
<table class="table table-bordered table-hover align-middle">
	<thead class="table-light">
		<tr>
			<th>社員番号</th>
			<th>氏名</th>
			<th>所属グループ</th>
			<th>詳細</th>
		</tr>
	</thead>
	<tbody id="userTable"></tbody>
</table>

<!-- ボタン -->
<div class="mt-3">
	<a href="userRegister.html" class="btn btn-secondary me-2">ユーザの登録</a>
</div>

</div>

<script>
// ----------------------------
// ダミーデータ
// ----------------------------
const users = [
	{ employee_number: 105, name: "山田 太郎", login_id: "営業部" },
	{ employee_number: 104, name: "佐藤 花子", login_id: "人事部" },
	{ employee_number: 103, name: "鈴木 一郎", login_id: "開発部" },
	{ employee_number: 102, name: "田中 次郎", login_id: "総務部" },
	{ employee_number: 101, name: "高橋 三郎", login_id: "営業部" },
	{ employee_number: 100, name: "伊藤 四郎", login_id: "人事部" },
	{ employee_number: 99, name: "渡辺 五郎", login_id: "開発部" },
	{ employee_number: 98, name: "小林 六郎", login_id: "営業部" },
	{ employee_number: 97, name: "加藤 七郎", login_id: "総務部" },
	{ employee_number: 96, name: "吉田 八郎", login_id: "人事部" },
	{ employee_number: 95, name: "中村 九郎", login_id: "開発部" },
	{ employee_number: 94, name: "山本 十郎", login_id: "営業部" },
	{ employee_number: 93, name: "井上 十一", login_id: "人事部" }
];

// ----------------------------
// 設定
// ----------------------------
const pageSize = 10;
let currentPage = 1;

// 社員番号 降順
users.sort((a, b) => b.employee_number - a.employee_number);

// ----------------------------
// 描画
// ----------------------------
function renderTable() {
	const tbody = document.getElementById("userTable");
	tbody.innerHTML = "";

	const start = (currentPage - 1) * pageSize;
	const end = start + pageSize;

	const pageData = users.slice(start, end);

	pageData.forEach(user => {
		tbody.innerHTML += `
		<tr>
			<td>${user.employee_number}</td>
			<td>${user.name}</td>
			<td>${user.login_id}</td>
			<td><a href="userDetail.html?employee_number=${user.employee_number}">詳細</a></td>
		</tr>
		`;
	});
}

// ----------------------------
// ページネーション
// ----------------------------
function renderPagination() {
	const pagination = document.getElementById("pagination");
	pagination.innerHTML = "";

	const totalPages = Math.ceil(users.length / pageSize);

	// 前
	pagination.innerHTML += `
	<li class="page-item ${currentPage === 1 ? "disabled" : ""}">
		<a class="page-link" href="#" onclick="changePage(${currentPage - 1})">«</a>
	</li>`;

	// 数字
	for (let i = 1; i <= totalPages; i++) {
		pagination.innerHTML += `
		<li class="page-item ${i === currentPage ? "active" : ""}">
			<a class="page-link" href="#" onclick="changePage(${i})">${i}</a>
		</li>`;
	}

	// 次
	pagination.innerHTML += `
	<li class="page-item ${currentPage === totalPages ? "disabled" : ""}">
		<a class="page-link" href="#" onclick="changePage(${currentPage + 1})">»</a>
	</li>`;
}

// ----------------------------
// ページ切替
// ----------------------------
function changePage(page) {
	const totalPages = Math.ceil(users.length / pageSize);

	if (page < 1 || page > totalPages) return;

	currentPage = page;
	renderTable();
	renderPagination();
}

// 初期表示
renderTable();
renderPagination();

</script>

</body>
</html>

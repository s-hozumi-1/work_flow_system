<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{parts/common :: html_head}"></head>
<body>
	<div class="header-wrapper">
		<header th:replace="~{parts/common :: page_header}"></header>
	</div>
	<div class="container">
		<h1>ユーザ登録</h1>
		<div class="row">
			<div class="row">
				<form th:action="@{/apply/confirm}" th:object="${apply}" method="post" class="col-md-12" enctype="multipart/form-data">
					<div class="form-group mb-3">
						<label>申請内容(必須)</label> <select th:field="*{detail.code}"
							id="formDetail" class="form-control custom-select border-line">
							<option th:each="d : ${detailList}" th:value="${d.code}"
								th:text="${d.name}"></option>
						</select>
					</div>
					<div class="form-group mb-3">
						<label>経費種別(必須)</label> <select th:field="*{expense.code}"
							id="formExpense" class="form-control custom-select border-line">
							<option th:each="e : ${expenseList}" th:value="${e.code}"
								th:text="${e.name}"></option>
						</select>
					</div>
					<div class="form-group mb-3">
						<div th:if="${#fields.hasErrors('usedDate')}"
							class="alert alert-danger" role="alert">
							<span th:errors="*{usedDate}" class="error"></span>
						</div>
						<label>使用日(必須)</label> <input type="text" th:field="*{usedDate}"
							id="formUsedDate" class="form-control border-line"
							placeholder="使用日" />
					</div>
					<div class="form-group mb-3">
						<div th:if="${#fields.hasErrors('paymentAmount')}"
							class="alert alert-danger" role="alert">
							<span th:errors="*{paymentAmount}" class="error"></span>
						</div>
						<label>出金額(必須)</label> <input type="text"
							th:field="*{paymentAmount}" id="formPaymentAmount"
							class="form-control border-line" placeholder="出金額" />
					</div>
					<div class="form-group mb-3">
						<div th:if="${#fields.hasErrors('usagePurpose')}"
							class="alert alert-danger" role="alert">
							<span th:errors="*{usagePurpose}" class="error"></span>
						</div>
						<label>使途・目的</label> <input type="text" th:field="*{usagePurpose}"
							id="formUsagePurpose" class="form-control border-line"
							placeholder="使途・目的" />
					</div>
					<div class="form-group mb-3">
						<div th:if="${#fields.hasErrors('payeeName')}"
							class="alert alert-danger" role="alert">
							<span th:errors="*{payeeName}" class="error"></span>
						</div>
						<label>支払い先</label> <input type="text" th:field="*{payeeName}"
							id="formPayeeName" class="form-control border-line"
							placeholder="支払い先" />
					</div>
					<div class="form-group mb-3">
						<div th:if="${#fields.hasErrors('approvalDate')}"
							class="alert alert-danger" role="alert">
							<span th:errors="*{approvalDate}" class="error"></span>
						</div>
						<label>承認締め日</label> <input type="text" th:field="*{approvalDate}"
							id="formApprovalDate" class="form-control border-line"
							placeholder="承認締め日" />
					</div>
					<div class="form-group mb-3">
						<div th:if="${#fields.hasErrors('note')}"
							class="alert alert-danger" role="alert">
							<span th:errors="*{note}" class="error"></span>
						</div>
						<label>備考</label> <input type="text" th:field="*{note}"
							id="formNote" class="form-control border-line" placeholder="備考" />
					</div>
					<div th:if="${fileError}" class="alert alert-danger" role="alert">
						<span th:text="${fileError}"></span>
					</div>
					<label>ファイル</label> <input type="file" name="file"
						class="form-control border-line" />
					<div class="form-group">
						<a th:href="@{/apply(page=${session.applyPage})}"
							class="btn btn-dark">キャンセル</a> <input type="submit"
							class="btn btn-dark" value="登録" />
					</div>
				</form>
			</div>
		</div>
	</div>
	<!-- /.container -->
	<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
